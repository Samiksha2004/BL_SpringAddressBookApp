spring.application.name=Spring-Address-Book-App-Development

server.port=8080



# Database Configuration for MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/addressbook_db

spring.datasource.username=root
spring.datasource.password=BL_SQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.SpringAddressBookAppDevelopment=DEBUG

# Log format and storage
logging.file.name=logs/addressbook.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n













